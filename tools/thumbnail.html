<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LeetCode Thumbnail — luci-studio blueprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue:   #1b56ff;   /* luci-studio blueprint blue  */
    --orange: #f2542d;   /* luci-studio vermilion        */
    --orange-ink: #d8431f;/* darker orange for small text */
    --paper:  #efeee8;   /* warm drafting-sheet cream    */
    --ink:    #101a29;   /* near-black navy — headlines  */
    --ink-soft: #545c6a; /* body/secondary text          */
    --ink-faint:#9aa1ac; /* mono annotations             */
    --line:   rgba(16,26,41,0.08);  /* grid + rules      */
    --diff:   #1a8f52;   /* set from CONFIG difficulty    */
  }

  html, body { background: var(--paper); }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: "Space Grotesk", system-ui, sans-serif;
  }

  /* Screenshot THIS element at 1280x720 for a crisp YouTube thumbnail.
     Inner sizes use cqw (1cqw = 1% card width) so it stays pixel-proportional. */
  .card {
    container-type: inline-size;
    width: 1280px;
    height: 720px;
    flex-shrink: 0;      /* never let a narrow window shrink the card — keeps screenshots exactly 1280x720 */
    position: relative;
    overflow: hidden;
    background: var(--paper);
    color: var(--ink);
  }

  /* drafting grid */
  .card::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--line) 0.1cqw, transparent 0.1cqw),
      linear-gradient(90deg, var(--line) 0.1cqw, transparent 0.1cqw);
    background-size: 3.2cqw 3.2cqw;
  }
  /* sheet frame */
  .card::after {
    content: "";
    position: absolute; inset: 2.3cqw;
    border: 0.1cqw solid rgba(16,26,41,0.14);
    pointer-events: none;
  }

  /* corner registration ticks */
  .tick { position: absolute; width: 2.2cqw; height: 2.2cqw; z-index: 3; }
  .tick::before, .tick::after { content: ""; position: absolute; background: var(--blue); }
  .tick::before { width: 100%; height: 0.14cqw; top: 0; }
  .tick::after  { height: 100%; width: 0.14cqw; left: 0; }
  .tick.tl { top: 2.9cqw; left: 2.9cqw; }
  .tick.tr { top: 2.9cqw; right: 2.9cqw; transform: scaleX(-1); }
  .tick.bl { bottom: 2.9cqw; left: 2.9cqw; transform: scaleY(-1); }
  .tick.br { bottom: 2.9cqw; right: 2.9cqw; transform: scale(-1); }

  .inner {
    position: relative; z-index: 2;
    height: 100%;
    padding: 6.2cqw 6.4cqw;
    display: grid;
    grid-template-columns: 1.14fr 0.86fr;
    gap: 3.8cqw;
    align-items: center;
  }

  /* ---------- left column ---------- */
  .left { display: flex; flex-direction: column; gap: 1.9cqw; }

  .eyebrow {
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 1.5cqw; font-weight: 600; letter-spacing: 0.24em;
    color: var(--blue);
    display: flex; align-items: center; gap: 0.9cqw;
  }
  .eyebrow .sq { width: 1.15cqw; height: 1.15cqw; background: var(--orange); }
  .eyebrow .sep { color: var(--ink-faint); }
  .eyebrow .coord { color: var(--ink-faint); }

  .title {
    font-family: "Space Grotesk", sans-serif;
    font-size: 8.6cqw;          /* CONFIG.titleSize overrides for long titles */
    line-height: 0.9;
    font-weight: 700;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    text-wrap: balance;
    color: var(--ink);
  }
  .title .tdot { color: var(--blue); }

  /* dimension line: |— Δ text · REV —|———— */
  .dimline {
    display: flex; align-items: center; gap: 1cqw;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 1.4cqw; font-weight: 500; letter-spacing: 0.06em;
    color: var(--ink-faint);
  }
  .dimline .cap { width: 0.12cqw; height: 1.9cqw; background: rgba(16,26,41,0.28); flex-shrink: 0; }
  .dimline .rule { flex: 1; height: 0.12cqw; background: rgba(16,26,41,0.18); }
  .dimline b { color: var(--ink-soft); font-weight: 600; }

  .meta { display: flex; align-items: center; gap: 2.2cqw; margin-top: 0.3cqw; }
  .m {
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 1.75cqw; font-weight: 600; letter-spacing: 0.03em;
    display: inline-flex; align-items: center; gap: 0.7cqw;
  }
  .m-diff { color: var(--diff); }
  .m-diff .sq { width: 1.2cqw; height: 1.2cqw; background: var(--diff); }
  .m-lang { color: var(--ink); border-bottom: 0.2cqw solid var(--blue); padding-bottom: 0.2cqw; }
  .m-lang .mark { color: var(--blue); }
  .m-beats { color: var(--orange-ink); border-bottom: 0.2cqw solid var(--orange); padding-bottom: 0.2cqw; }

  /* ---------- right column: drafting schematic ---------- */
  .right { position: relative; }
  .schematic {
    position: relative;
    border: 0.12cqw solid rgba(16,26,41,0.20);
    padding: 3.1cqw 2.6cqw 2.6cqw;
    background: rgba(255,255,255,0.35);
  }
  .fig {
    position: absolute; top: -1cqw; left: 1.5cqw;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 1.3cqw; font-weight: 600; letter-spacing: 0.12em;
    color: var(--blue); background: var(--paper); padding: 0 0.8cqw;
  }
  .nlabel {
    position: absolute; top: -1cqw; right: 1.5cqw;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 1.3cqw; font-weight: 600; letter-spacing: 0.06em;
    color: var(--ink-faint); background: var(--paper); padding: 0 0.8cqw;
  }
  .sch-cap {
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 1.5cqw; color: var(--ink-soft); margin-bottom: 1.5cqw; letter-spacing: 0.02em;
  }
  .sch-cap b { color: var(--orange-ink); font-weight: 700; }

  .array { display: grid; gap: 0.9cqw; }
  .row-ptrs, .row-boxes, .row-idx { display: grid; gap: 1.05cqw; }
  .box {
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 3.3cqw; font-weight: 600;
    position: relative;
  }
  .box.keep {
    background: rgba(27,86,255,0.08);
    border: 0.24cqw solid var(--blue);
    color: var(--ink);
  }
  .box.drop {
    background: rgba(242,84,45,0.09);
    border: 0.24cqw solid var(--orange);
    color: var(--orange-ink);
  }
  .box.drop::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(-22deg,
      transparent calc(50% - 0.19cqw),
      var(--orange) calc(50% - 0.19cqw),
      var(--orange) calc(50% + 0.19cqw),
      transparent calc(50% + 0.19cqw));
    opacity: 0.85;
  }
  .idx {
    text-align: center;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 1.3cqw; color: var(--ink-faint);
  }
  .ptr {
    display: flex; flex-direction: column; align-items: center;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-weight: 700; font-size: 1.85cqw; line-height: 1;
  }
  .ptr .arrow { font-size: 1.65cqw; }
  .ptr.i { color: var(--blue); }
  .ptr.j { color: var(--orange-ink); }

  .sch-note {
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 1.3cqw; color: var(--ink-faint); letter-spacing: 0.03em;
    margin-top: 1.5cqw; display: flex; align-items: center; gap: 0.8cqw;
  }
  .sch-note::before { content: "▸"; color: var(--blue); }

  /* ---------- brand lockup (real logo asset, embedded as data URI) ---------- */
  .brand {
    position: absolute; z-index: 3;
    right: 4.2cqw; bottom: 3.1cqw;
    display: flex; align-items: center; gap: 1cqw;
    white-space: nowrap;
  }
  .brand .mark { width: 2.9cqw; height: 2.9cqw; border-radius: 0.7cqw; display: block; }
  .brand .wm {
    font-family: "Space Grotesk", sans-serif;
    font-size: 1.75cqw; font-weight: 700; letter-spacing: 0.005em;
    color: var(--ink);
  }
  .brand .wm::after { content: "."; color: var(--blue); }
</style>
</head>

<script>
  /* =======================================================================
     EDIT THIS BLOCK FOR EACH NEW VIDEO, then screenshot the .card element.
     ======================================================================= */
  const CONFIG = {
    number:       "27",
    title:        "Remove Element",
    difficulty:   "EASY",              // EASY | MEDIUM | HARD  (color auto-set)
    language:     "Dart",
    coord:        "N 10°49'",          // studio geo-tag (kept from the site DNA)

    beats:        "100%",              // "⚡ Beats <beats>"; set "" to hide
    complexity:   "O(n) time · O(1) space",
    dimline:      "Δ nums[4] · REMOVE val=3 · REV 1.0",  // drafting dimension caption

    // schematic
    figLabel:     "FIG.01 — TWO POINTERS",
    arrName:      "nums",
    array:        [3, 2, 2, 3],
    removeVal:    3,                   // boxes equal to this are marked "remove"
    iIndex:       3,                   // read pointer  (0-based, -1 to hide)
    jIndex:       2,                   // write pointer (0-based, -1 to hide)

    brand:        "luci studio",  // corner wordmark (logo badge embedded as data URI)
    titleSize:    "",                  // e.g. "6.6cqw" for long titles; "" = default 8.6cqw
  };
  /* ===================================================================== */

  /* LeetCode difficulty colours — the one deliberate exception to the
     blue+orange brand palette (semantic convention viewers expect),
     darkened for AA contrast on the cream sheet. */
  const DIFF_COLORS = { EASY: "#1a8f52", MEDIUM: "#b3730a", HARD: "#d43a2f" };

  function render(cfg) {
    document.documentElement.style.setProperty(
      "--diff", DIFF_COLORS[cfg.difficulty] || DIFF_COLORS.EASY);

    document.getElementById("num").textContent = "#" + cfg.number;
    document.getElementById("coord").textContent = cfg.coord;
    document.getElementById("title").textContent = cfg.title;
    document.getElementById("diffText").textContent = cfg.difficulty;
    document.getElementById("lang").textContent = cfg.language;
    document.getElementById("dim").textContent = cfg.dimline;
    document.getElementById("note").textContent = cfg.complexity;
    document.getElementById("fig").textContent = cfg.figLabel;
    document.getElementById("nlabel").textContent = "n = " + cfg.array.length;
    document.getElementById("arrName").textContent = cfg.arrName;
    document.getElementById("valLabel").textContent = cfg.removeVal;
    document.getElementById("brandText").textContent = cfg.brand;

    if (cfg.titleSize) document.getElementById("title").parentElement.style.fontSize = cfg.titleSize;

    const beats = document.getElementById("beats");
    if (cfg.beats) beats.textContent = "⚡ Beats " + cfg.beats;
    else beats.style.display = "none";

    const n = cfg.array.length;
    const cols = "repeat(" + n + ", 1fr)";

    const ptrs = document.createElement("div");
    ptrs.className = "row-ptrs";
    ptrs.style.gridTemplateColumns = cols;

    const boxes = document.createElement("div");
    boxes.className = "row-boxes";
    boxes.style.gridTemplateColumns = cols;

    const idxRow = document.createElement("div");
    idxRow.className = "row-idx";
    idxRow.style.gridTemplateColumns = cols;

    cfg.array.forEach((v, idx) => {
      const b = document.createElement("div");
      b.className = "box " + (v === cfg.removeVal ? "drop" : "keep");
      b.textContent = v;
      boxes.appendChild(b);

      const p = document.createElement("div");
      if (idx === cfg.iIndex || idx === cfg.jIndex) {
        const labels = [];
        if (idx === cfg.jIndex) labels.push('<span class="ptr j"><span class="arrow">&#9650;</span>j</span>');
        if (idx === cfg.iIndex) labels.push('<span class="ptr i"><span class="arrow">&#9650;</span>i</span>');
        p.style.display = "flex";
        p.style.justifyContent = "center";
        p.style.gap = "0.8cqw";
        p.innerHTML = labels.join("");
      }
      ptrs.appendChild(p);

      const ix = document.createElement("div");
      ix.className = "idx";
      ix.textContent = idx;
      idxRow.appendChild(ix);
    });

    const arr = document.getElementById("array");
    arr.innerHTML = "";
    arr.appendChild(ptrs);
    arr.appendChild(boxes);
    arr.appendChild(idxRow);
  }

  render(CONFIG);
</script>
